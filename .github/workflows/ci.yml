name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint + zizmor
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
      - name: install zizmor
        run: pipx install zizmor==1.24.1

      - name: zizmor
        run: zizmor --quiet .github/workflows/

  terraform:
    name: tofu fmt + validate + trivy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: tofu fmt -check
        run: tofu fmt -recursive -check -diff

      - name: tofu init -backend=false
        working-directory: terraform
        run: tofu init -backend=false

      - name: tofu validate
        working-directory: terraform
        run: tofu validate

      # tflint is intentionally not run — its terraform plugin (v0.14.x bundled
      # with tflint 0.62.0) doesn't understand OpenTofu 1.8+ early-eval syntax
      # (`module.source = local.modules.<name>.source`), which we use as the
      # single source of truth for module pins (versions.tf, decision D11).
      # Re-enable when the ruleset adds early-eval support.

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: HIGH,CRITICAL
          exit-code: '1'
          # `.terraform/` is the vendored module cache populated by `tofu init`
          # above; skip it so we only scan our own .tf, not the modules' internals.
          skip-dirs: terraform/.terraform
          # Per-rule allowlist with rationale; see .trivyignore for entries.
          trivyignores: .trivyignore

  yaml:
    name: yamllint + kubeconform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip install yamllint
        run: pip install yamllint==1.38.0

      - name: yamllint
        run: yamllint -s argocd-bootstrap/ resources/ .github/

      - name: install kubeconform
        run: |
          curl -sSL -o kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tgz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: kubeconform
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            -ignore-filename-pattern '(Chart|values.*)\.yaml' \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            argocd-bootstrap/ resources/
