apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: jenkins-masters
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  enabled: 'true'
          - git:
              repoURL: https://github.com/nogueiraanderson/percona-ci-platform
              revision: HEAD
              directories:
                - path: resources/jenkins/master/instances/*
  template:
    metadata:
      name: 'jenkins-{{ path.basename }}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/nogueiraanderson/percona-ci-platform
        targetRevision: HEAD
        path: resources/jenkins/master
        helm:
          valueFiles:
            - values-base.yaml
            - 'instances/{{ path.basename }}/values.yaml'
      destination:
        server: '{{ server }}'
        namespace: 'jenkins-{{ path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
