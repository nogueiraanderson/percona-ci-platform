controller:
  image:
    registry: "<account-id>.dkr.ecr.eu-central-1.amazonaws.com"
    repository: jenkins-percona
    tag: "2.528.3"
    pullPolicy: IfNotPresent
  installPlugins: false
  overwritePluginsFromImage: false
  initializeOnce: true
  javaOpts: >-
    -Xms2048m -Xmx3072m -Xss4m -server
    -Djava.awt.headless=true
    -Dorg.jenkinsci.plugins.durabletask.BourneShellScript.HEARTBEAT_CHECK_INTERVAL=600
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  serviceType: ClusterIP
  agentListenerPort: 50000
  agentListenerServiceType: LoadBalancer
  agentListenerServiceAnnotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "iit-billing-tag=jenkins-eks-poc"
  numExecutors: 1
  executorMode: "EXCLUSIVE"
  ingress:
    enabled: true
    ingressClassName: alb
    hostName: ps57-3.cd.percona.com
    annotations:
      alb.ingress.kubernetes.io/group.name: jenkins-shared
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-central-1:<account-id>:certificate/1ec6590a-0529-4af0-81e9-ec59ec71aab2"
      alb.ingress.kubernetes.io/healthcheck-path: /login
      alb.ingress.kubernetes.io/tags: "iit-billing-tag=jenkins-eks-poc"
    tls:
      - hosts:
          - ps57-3.cd.percona.com
  JCasC:
    defaultConfig: false
    overwriteConfiguration: false
  podLabels:
    iit-billing-tag: jenkins-eks-poc
  containerEnv:
    - name: JENKINS_URL
      value: "https://ps57-3.cd.percona.com/"
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: ps57-3-admin
          key: password
          optional: true
  customInitContainers:
    - name: groovy-init
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "Linking persistent groovy scripts..."
          mkdir -p /var/jenkins_home/init.groovy.d
          for f in /opt/groovy/persistent/*.groovy; do
            [ -f "$f" ] && ln -sf "$f" "/var/jenkins_home/init.groovy.d/$(basename $f)"
          done
          if [ ! -f /var/jenkins_home/.clone-initialized ]; then
            echo "First boot: copying one-time scripts..."
            cp /opt/groovy/one-time/*.groovy /var/jenkins_home/init.groovy.d/ 2>/dev/null || true
          fi
      volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home
        - name: groovy-persistent
          mountPath: /opt/groovy/persistent
        - name: groovy-one-time
          mountPath: /opt/groovy/one-time
persistence:
  enabled: true
  existingClaim: ps57-3-jenkins-home
  volumes:
    - name: groovy-persistent
      configMap:
        name: ps57-3-groovy-persistent
    - name: groovy-one-time
      configMap:
        name: ps57-3-groovy-one-time
serviceAccount:
  create: false
  name: jenkins
agent:
  enabled: false
