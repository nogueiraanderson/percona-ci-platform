apiVersion: v1
kind: PersistentVolume
metadata:
  name: ps57-2-jenkins-home
  labels:
    iit-billing-tag: jenkins-eks-poc
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-0e84fd80976c3761e
    fsType: xfs
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - eu-central-1b
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ps57-2-jenkins-home
  namespace: jenkins
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 100Gi
  volumeName: ps57-2-jenkins-home
