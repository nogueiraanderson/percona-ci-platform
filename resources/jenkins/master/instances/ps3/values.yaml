# ps3.cd.percona.com — Jenkins master, in-cluster mode (PoC).
host: ps3.cd.percona.com
mode: in-cluster

storage:
  storageClassName: gp3-jenkins-1a-retain
  size: 100Gi
  # Set after running scripts/migrate-ps3-snapshot.sh; pre-binds the PVC to the
  # cross-region-copied EBS volume in us-east-1a. Leave commented for fresh PVC.
  # preExistingVolumeID: vol-xxxxxxxxxxxxxxxxx

nodeAffinity:
  workload: jenkins
  zone: us-east-1a

resources:
  requests: { cpu: "1", memory: "4Gi" }
  limits: { cpu: "4", memory: "12Gi" }

ingress:
  enabled: true
  group: jenkins-cd
  sslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
