apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: percona-ci-platform-karpenter-node   # rewritten via ApplicationSet
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: percona-ci-platform
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: percona-ci-platform
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 80Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  tags:
    managed-by: karpenter
    repo: github.com/nogueiraanderson/percona-ci-platform
